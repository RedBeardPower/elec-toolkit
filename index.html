window.cvTab=function(tab,btn){document.querySelectorAll('#cv-tabs .tab-btn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');['cv-units','cv-wire','cv-temp','cv-prefix'].forEach(function(id){document.getElementById(id).style.display='none';});document.getElementById('cv-'+tab).style.display='block';};
var CV_BASE={W:1,kW:1000,MW:1e6,HP:746,BTU_hr:0.29307,ton:3516.85,V:1,kV:1000,A:1,mA:0.001,Ohm:1,kOhm:1000,MOhm:1e6,ft:0.3048,m:1,in_:0.0254,mm:0.001,km:1000,gal:3.78541,L:1,lb:0.453592,kg:1};
// Category groups — only units in the same group can convert to each other
var CV_CATS={
  power:['W','kW','MW','HP','BTU_hr','ton'],
  voltage:['V','kV'],
  current:['A','mA'],
  resistance:['Ohm','kOhm','MOhm'],
  length:['ft','m','in_','mm','km'],
  volume:['gal','L'],
  mass:['lb','kg']
};
var CV_UNIT_LABELS={W:'Watts',kW:'Kilowatts',MW:'Megawatts',HP:'Horsepower',BTU_hr:'BTU/hour',ton:'Tons (cooling)',V:'Volts',kV:'Kilovolts',A:'Amps',mA:'Milliamps',Ohm:'Ohms',kOhm:'Kilohms',MOhm:'Megohms',ft:'Feet',m:'Meters',in_:'Inches',mm:'Millimeters',km:'Kilometers',gal:'Gallons',L:'Liters',lb:'Pounds',kg:'Kilograms'};
function cvCatOf(unit){var cat=null;Object.keys(CV_CATS).forEach(function(c){if(CV_CATS[c].indexOf(unit)>=0)cat=c;});return cat;}
function cvBuildFromOpts(){
  var all=Object.keys(CV_UNIT_LABELS);
  return all.map(function(u){return '<option value="'+u+'">'+CV_UNIT_LABELS[u]+' ('+u.replace('_','')+')</option>';}).join('');
}
function cvBuildToOpts(fromUnit){
  var cat=cvCatOf(fromUnit);
  var compatible=cat?CV_CATS[cat]:[fromUnit];
  return compatible.map(function(u){return '<option value="'+u+'">'+CV_UNIT_LABELS[u]+' ('+u.replace('_','')+')</option>';}).join('');
}
window['init_convtable']=function(){
  document.getElementById('cv-from').innerHTML=cvBuildFromOpts();
  document.getElementById('cv-from').value='W';
  cvFromChanged();
  cvWire();cvTemp();
};
window.cvFromChanged=function(){
  var from=document.getElementById('cv-from').value;
  var toSel=document.getElementById('cv-to');
  var prevTo=toSel.value;
  toSel.innerHTML=cvBuildToOpts(from);
  // keep previous selection if still valid, else default to second item (different from from)
  var opts=[...toSel.options].map(function(o){return o.value;});
  if(opts.indexOf(prevTo)>=0&&prevTo!==from){toSel.value=prevTo;}
  else{var diff=opts.find(function(o){return o!==from;});if(diff)toSel.value=diff;}
  cvConvert();
};
window.cvConvert=function(){
  var raw=document.getElementById('cv-val').value,from=document.getElementById('cv-from').value,to=document.getElementById('cv-to').value,bf=CV_BASE[from],bt=CV_BASE[to];
  var res=document.getElementById('cv-unit-result');
  if(raw.trim()===''){res.innerHTML='<div class="err">Enter a value to convert.</div>';return;}
  var v=parseFloat(raw);
  if(!isFinite(v)){res.innerHTML='<div class="err">Enter a valid number.</div>';return;}
  // hard guard: units must exist AND share a category (no inches-to-horsepower)
  if(!bf||!bt||cvCatOf(from)!==cvCatOf(to)||cvCatOf(from)===null){
    res.innerHTML='<div class="err">Those units do not convert to each other - pick a matching unit type.</div>';
    return;
  }
  var result=(v*bf)/bt;
  res.innerHTML=rb(rr(v+' '+from.replace('_',''),result.toPrecision(6).replace(/\.?0+$/,'')+' '+to.replace('_',''),'good'));
};
window.cvWire=function(){
  var el=document.getElementById('cv-wval');if(!el)return;
  if(el.value.trim()===''||!isFinite(parseFloat(el.value))){document.getElementById('cv-wire-result').innerHTML='<div class="err">Enter a value to convert.</div>';return;}
  var v=+el.value,from=document.getElementById('cv-wfrom').value,kcmil;
  if(from==='kcmil')kcmil=v;else if(from==='cmil')kcmil=v/1000;else if(from==='mm2')kcmil=v/0.5067;else kcmil=v/0.0007854;
  var cmil=kcmil*1000,mm2=kcmil*0.5067,in2=kcmil*0.0007854;
  document.getElementById('cv-wire-result').innerHTML=rb(rh('Equivalent Areas')+rr('kcmil',kcmil.toFixed(3),'good')+rr('Circular Mils',Math.round(cmil).toLocaleString(),'')+rr('mm2',mm2.toFixed(3),'')+rr('in2',in2.toFixed(6),''));
};
window.cvTemp=function(){
  var el=document.getElementById('cv-tval');if(!el)return;
  if(el.value.trim()===''||!isFinite(parseFloat(el.value))){document.getElementById('cv-temp-result').innerHTML='<div class="err">Enter a value to convert.</div>';return;}
  var v=+el.value,from=document.getElementById('cv-tfrom').value,c,f,k;
  if(from==='C'){c=v;f=c*9/5+32;k=c+273.15;}else if(from==='F'){f=v;c=(f-32)*5/9;k=c+273.15;}else{k=v;c=k-273.15;f=c*9/5+32;}
  document.getElementById('cv-temp-result').innerHTML=rb(rh('Result')+rr('Celsius',c.toFixed(2)+' C','good')+rr('Fahrenheit',f.toFixed(2)+' F','')+rr('Kelvin',k.toFixed(2)+' K',''));
};

renderHome();

  navigator.serviceWorker.register('./sw.js').catch(function(){});
}
